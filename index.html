<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STRATOS | GLOBAL WAR INTEL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { background:#000; color:#00f3ff; font-family:'JetBrains Mono'; margin:0; overflow:hidden; }
        #viewport { position:fixed; top:0; left:0; width:100%; height:100%; opacity:.25; z-index:1; }
        #hud { position:relative; z-index:5; padding:10px; height:100vh; display:flex; flex-direction:column; }
        .panel { background:rgba(0,10,15,.9); border:1px solid rgba(0,255,255,.2); border-radius:6px; padding:10px; margin-bottom:8px; overflow:auto; }
        #intel { flex:1.5; border-left:4px solid #ff003c; }
        #conflicts { flex:0.6; border-left:4px solid #ffaa00; }
        #combat { flex:1.2; border-left:4px solid #00ff88; }
        .log { font-size:.7rem; margin-bottom:6px; color:white; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 4px; }
        .tag { color:#ff003c; font-size:.6rem; font-weight: bold; margin-right: 5px; }
        .win { color:#00ff88; font-family:'Orbitron'; font-weight:900; display: block; margin: 10px 0; }
        .controls { margin-top: auto; }
        select { width:48%; padding:12px; background:#000; color:#00f3ff; border:1px solid #00f3ff; border-radius: 4px; font-size: 0.7rem; }
        button { width:100%; padding:18px; background:#ff003c; border:none; color:white; font-family:'Orbitron'; font-weight:900; cursor:pointer; border-radius: 4px; margin-top: 5px; }
    </style>
</head>
<body>

<div id="viewport"></div>

<div id="hud">
    <div style="display:flex;justify-content:space-between; align-items: center; margin-bottom: 10px;">
        <div>
            <h3 style="font-family:Orbitron; font-size: 0.8rem; margin:0;">LIVE GLOBAL INTELLIGENCE</h3>
            <span style="color:#00ff88; font-size: 0.6rem;">● CONECTADO: AGÊNCIAS REAIS</span>
        </div>
        <div id="clock" style="font-size: 0.9rem; font-weight: bold; border: 1px solid #00f3ff; padding: 2px 8px;">00:00:00</div>
    </div>

    <div id="intel" class="panel">
        <div id="newsFeed">Sincronizando dados táticos...</div>
    </div>

    <div id="conflicts" class="panel">
        <div id="conflictList"></div>
    </div>

    <div id="combat" class="panel">
        <div id="report">Aguardando definição de alvos...</div>
    </div>

    <div class="controls">
        <div style="display:flex;justify-content:space-between;margin-bottom:5px">
            <select id="p1"></select>
            <select id="p2"></select>
        </div>
        <button onclick="simulate()">LANÇAR SIMULAÇÃO TÁTICA</button>
    </div>
</div>

<script>
const API = "ae46552e7af9425b8abfe9ed218ace41";
const PAISES = ["Afeganistão","África do Sul","Albânia","Alemanha","Andorra","Angola","Antígua e Barbuda","Arábia Saudita","Argélia","Argentina","Armênia","Austrália","Áustria","Azerbaijão","Bahamas","Bangladesh","Barbados","Barein","Bélgica","Belize","Benim","Bielorrússia","Bolívia","Bósnia e Herzegovina","Botswana","Brasil","Brunei","Bulgária","Burkina Faso","Burundi","Butão","Cabo Verde","Camarões","Camboja","Canadá","Catar","Cazaquistão","Chade","Chile","China","Chipre","Colômbia","Comores","Congo-Brazzaville","Congo-Kinshasa","Coreia do Norte","Coreia do Sul","Costa do Marfim","Costa Rica","Croácia","Cuba","Dinamarca","Djibouti","Dominica","Egito","El Salvador","Emirados Árabes Unidos","Equador","Eritreia","Eslováquia","Eslovênia","Espanha","Estados Unidos","Estônia","Eswatini","Etiópia","Fiji","Filipinas","Finlândia","França","Gabão","Gâmbia","Gana","Geórgia","Granada","Grécia","Guatemala","Guiana","Guiné","Guiné-Bissau","Guiné Equatorial","Haiti","Honduras","Hungria","Iêmen","Ilhas Marshall","Ilhas Salomão","Índia","Indonésia","Irã","Iraque","Irlanda","Islândia","Israel","Itália","Jamaica","Japão","Jordânia","Kiribati","Kuwait","Laos","Lesoto","Letônia","Líbano","Libéria","Líbia","Liechtenstein","Lituânia","Luxemburgo","Macedônia do Norte","Madagascar","Malásia","Malawi","Maldivas","Mali","Malta","Marrocos","Maurício","Mauritânia","México","Micronésia","Moçambique","Moldávia","Mônaco","Mongólia","Montenegro","Namíbia","Nauru","Nepal","Nicarágua","Níger","Nigéria","Noruega","Nova Zelândia","Omã","Países Baixos","Palau","Palestina","Panamá","Papua-Nova Guiné","Paquistão","Paraguai","Peru","Polônia","Portugal","Quênia","Quirguistão","Reino Unido","República Centro-Africana","República Checa","República Dominicana","Romênia","Ruanda","Rússia","Samoa","San Marino","Santa Lúcia","São Cristóvão e Névis","São Tomé e Príncipe","São Vicente e Granadinas","Senegal","Serra Leoa","Sérvia","Seychelles","Singapura","Síria","Somália","Sri Lanka","Sudão","Sudão do Sul","Suécia","Suíça","Suriname","Tailândia","Taiwan","Tajiquistão","Tanzânia","Timor-Leste","Togo","Tonga","Trinidad e Tobago","Tunísia","Turcomenistão","Turquia","Tuvalu","Ucrânia","Uganda","Uruguai","Uzbequistão","Vanuatu","Vaticano","Venezuela","Vietnã","Zâmbia","Zimbábue"];

const military = {
    "Estados Unidos": {p:98, desc: "Domínio total aero-naval e tecnologia furtiva."},
    "China": {p:96, desc: "Maior capacidade industrial e massa terrestre."},
    "Rússia": {p:94, desc: "Arsenal nuclear massivo e experiência em guerra fria."},
    "Israel": {p:92, desc: "Defesa Iron Dome e inteligência de elite."},
    "Irã": {p:85, desc: "Drones suicidas e táticas de guerra assimétrica."},
    "Ucrânia": {p:82, desc: "Alta experiência em combate moderno e artilharia."},
    "Brasil": {p:78, desc: "Maior poder bélico da América Latina."}
};

async function fetchNews() {
    let feed = document.getElementById('newsFeed');
    try {
        let r = await fetch(`https://newsapi.org/v2/everything?q=(war OR military OR missile)&language=pt&sortBy=publishedAt&apiKey=${API}`);
        let d = await r.json();
        if(d.articles && d.articles.length > 0) {
            feed.innerHTML = "";
            d.articles.slice(0, 10).forEach(a => {
                feed.innerHTML += `<div class="log"><span class="tag">[INTEL]</span>${a.title}</div>`;
            });
        } else { throw new Error(); }
    } catch {
        // FEED DE CONTINGÊNCIA SE A API FALHAR
        const backup = [
            "Movimentação de tropas detectada na fronteira Leste.",
            "Sistemas de defesa aérea em prontidão máxima em Israel.",
            "EUA reforçam presença naval no Mar Vermelho.",
            "Novos testes de mísseis relatados na península coreana.",
            "Ciberataques atingem infraestrutura crítica na Europa."
        ];
        feed.innerHTML = backup.map(m => `<div class="log"><span class="tag">[ALERTA]</span>${m}</div>`).join('');
    }
}

function simulate() {
    let a = document.getElementById('p1').value, b = document.getElementById('p2').value;
    if(a === b) return;
    let sa = military[a]?.p || 65, sb = military[b]?.p || 65;
    let win = sa > sb ? a : b;
    document.getElementById('report').innerHTML = `
        <span class="win">DOMÍNIO: ${win}</span>
        <small>${military[win]?.desc || "Vantagem tática convencional."}</small><br>
        Probabilidade Analítica: ${Math.max(sa,sb)}.0%
    `;
}

// Inicialização
PAISES.sort().forEach(p => {
    p1.innerHTML += `<option value="${p}">${p}</option>`;
    p2.innerHTML += `<option value="${p}">${p}</option>`;
});
const conflicts = ["Rússia vs Ucrânia (Ativo)", "Israel vs Hamas (Ativo)", "Irã vs Israel (Tensão)", "China vs Taiwan (Monitoramento)"];
conflicts.forEach(c => conflictList.innerHTML += `<div class="log" style="color:#ffaa00">⚠ ${c}</div>`);
setInterval(() => clock.innerText = new Date().toLocaleTimeString(), 1000);
fetchNews(); setInterval(fetchNews, 600000);

// Globo 3D
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({alpha:true});
renderer.setSize(window.innerWidth, window.innerHeight);
viewport.appendChild(renderer.domElement);
const globe = new THREE.Mesh(new THREE.SphereGeometry(5,32,32), new THREE.MeshPhongMaterial({map:new THREE.TextureLoader().load("https://threejs.org/examples/textures/planets/earth_atk_2048.jpg")}));
scene.add(globe); scene.add(new THREE.AmbientLight(0x555555));
const light = new THREE.DirectionalLight(0xffffff, 1); light.position.set(5,3,5); scene.add(light);
camera.position.z = 12;
function animate() { requestAnimationFrame(animate); globe.rotation.y += 0.0015; renderer.render(scene, camera); }
animate();
</script>
</body>
</html>
