<!DOCTYPE html>
<html lang="pt-br">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>STRATOS | GLOBAL WAR INTEL</title>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono&display=swap" rel="stylesheet">

<style>

body{
background:#000;
color:#00f3ff;
font-family:'JetBrains Mono';
margin:0;
overflow:hidden;
}

#viewport{
position:fixed;
top:0;
left:0;
width:100%;
height:100%;
opacity:.25;
z-index:1;
}

#hud{
position:relative;
z-index:5;
padding:10px;
height:100vh;
display:flex;
flex-direction:column;
}

.panel{
background:rgba(0,10,15,.92);
border:1px solid rgba(0,255,255,.2);
border-radius:6px;
padding:10px;
margin-bottom:8px;
overflow:auto;
}

#intel{flex:1.5;border-left:4px solid #ff003c;}
#conflicts{flex:.6;border-left:4px solid #ffaa00;}
#combat{flex:1.2;border-left:4px solid #00ff88;}

.log{
font-size:.72rem;
margin-bottom:6px;
color:white;
border-bottom:1px solid rgba(255,255,255,.05);
padding-bottom:4px;
}

.tag{
color:#ff003c;
font-size:.65rem;
font-weight:bold;
margin-right:5px;
}

.win{
color:#00ff88;
font-family:'Orbitron';
font-weight:900;
font-size:.9rem;
}

.controls{margin-top:auto;}

select{
width:48%;
padding:12px;
background:#000;
color:#00f3ff;
border:1px solid #00f3ff;
border-radius:4px;
font-size:.7rem;
}

button{
width:100%;
padding:18px;
background:#ff003c;
border:none;
color:white;
font-family:'Orbitron';
font-weight:900;
cursor:pointer;
border-radius:4px;
margin-top:5px;
}

.alert{
color:#ff4444;
font-weight:bold;
}

</style>
</head>

<body>

<div id="viewport"></div>

<div id="hud">

<div style="display:flex;justify-content:space-between">

<div>
<h3 style="font-family:Orbitron;margin:0">STRATOS INTELLIGENCE</h3>
<span style="color:#00ff88;font-size:.65rem">● GLOBAL SURVEILLANCE ACTIVE</span>
</div>

<div id="clock" style="border:1px solid #00f3ff;padding:4px 8px"></div>

</div>

<div id="intel" class="panel">
<div id="newsFeed">Conectando aos satélites...</div>
</div>

<div id="conflicts" class="panel">
<div id="conflictList"></div>
</div>

<div id="combat" class="panel">
<div id="report">Aguardando simulação estratégica...</div>
</div>

<div class="controls">

<div style="display:flex;justify-content:space-between;margin-bottom:5px">

<select id="p1"></select>
<select id="p2"></select>

</div>

<button onclick="simulate()">INICIAR SIMULAÇÃO DE GUERRA</button>

</div>

</div>

<script>

const API="SUA_API_AQUI";

const KEYWORDS=["war","attack","missile","military","invasion","nuclear","bomb","troops"];

const MILITARY={

"Estados Unidos":{air:95,land:90,tech:98,eco:95,nuke:95},

"China":{air:90,land:95,tech:90,eco:93,nuke:85},

"Rússia":{air:88,land:92,tech:82,eco:70,nuke:98},

"Israel":{air:92,land:85,tech:96,eco:80,nuke:85},

"Índia":{air:82,land:88,tech:75,eco:78,nuke:80},

"Irã":{air:70,land:85,tech:65,eco:60,nuke:40},

"Brasil":{air:68,land:70,tech:65,eco:75,nuke:0}

};

function score(c){

let d=MILITARY[c]||{air:60,land:60,tech:60,eco:60,nuke:0};

return d.air*.25+d.land*.25+d.tech*.2+d.eco*.2+d.nuke*.1;

}

function simulate(){

let a=p1.value;
let b=p2.value;

let sa=score(a);
let sb=score(b);

let winner=sa>sb?a:b;
let loser=sa>sb?b:a;

let diff=Math.abs(sa-sb).toFixed(1);

report.innerHTML=`

<span class="win">DOMÍNIO MILITAR: ${winner}</span><br><br>

Conflito hipotético entre <b>${a}</b> e <b>${b}</b>.<br><br>

<b>FORÇAS DE ${winner}</b><br>
• superioridade tecnológica<br>
• logística militar avançada<br>
• melhor capacidade aérea<br><br>

<b>FRAQUEZAS DE ${loser}</b><br>
• economia militar menor<br>
• menor poder estratégico<br>
• tecnologia inferior<br><br>

Probabilidade de vitória: ${(Math.max(sa,sb)).toFixed(0)}%<br>
Diferença estratégica: ${diff}

`;

}

async function fetchNews(){

let url=`https://newsapi.org/v2/everything?q=war OR military OR missile OR invasion&language=pt&sortBy=publishedAt&pageSize=10&apiKey=${API}`;

try{

let r=await fetch(url);
let d=await r.json();

newsFeed.innerHTML="";

d.articles.forEach(a=>{

let title=a.title.toLowerCase();

let alert=KEYWORDS.some(k=>title.includes(k));

newsFeed.innerHTML+=`

<div class="log">

<span class="tag">[INTEL]</span>

${alert?'<span class="alert">⚠</span>':''}

${a.title}

</div>`;

});

}catch{

newsFeed.innerHTML="<div class='log'>Falha na conexão com satélites.</div>";

}

}

const CONFLICTS=[

"Rússia vs Ucrânia (ATIVO)",
"Israel vs Hamas (ATIVO)",
"Irã vs Israel (TENSÃO)",
"China vs Taiwan (MONITORAMENTO)",
"Coreia do Norte vs Coreia do Sul"

];

CONFLICTS.forEach(c=>{

conflictList.innerHTML+=`<div class="log" style="color:#ffaa00">⚠ ${c}</div>`;

});

PAISES.sort().forEach(p=>{

p1.innerHTML+=`<option>${p}</option>`;
p2.innerHTML+=`<option>${p}</option>`;

});

setInterval(()=>clock.innerText=new Date().toLocaleTimeString(),1000);

fetchNews();
setInterval(fetchNews,120000);

const scene=new THREE.Scene();

const camera=new THREE.PerspectiveCamera(45,window.innerWidth/window.innerHeight,.1,1000);

const renderer=new THREE.WebGLRenderer({alpha:true});

renderer.setSize(window.innerWidth,window.innerHeight);

viewport.appendChild(renderer.domElement);

const globe=new THREE.Mesh(

new THREE.SphereGeometry(5,64,64),

new THREE.MeshPhongMaterial({

map:new THREE.TextureLoader().load("https://threejs.org/examples/textures/planets/earth_atk_2048.jpg")

})

);

scene.add(globe);

scene.add(new THREE.AmbientLight(0x444444));

const light=new THREE.DirectionalLight(0xffffff,1);

light.position.set(5,3,5);

scene.add(light);

camera.position.z=12;

function animate(){

requestAnimationFrame(animate);

globe.rotation.y+=0.0012;

renderer.render(scene,camera);

}

animate();

</script>

</body>
</html>
