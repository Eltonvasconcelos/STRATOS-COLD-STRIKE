<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STRATOS | GLOBAL WAR INTEL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono&display=swap" rel="stylesheet">
    <style>
        body { background:#000; color:#00f3ff; font-family:'JetBrains Mono'; margin:0; overflow:hidden; }
        #viewport { position:fixed; top:0; left:0; width:100%; height:100%; opacity:.25; z-index:1; }
        #hud { position:relative; z-index:5; padding:10px; height:100vh; display:flex; flex-direction:column; }
        .panel { background:rgba(0,10,15,.9); border:1px solid rgba(0,255,255,.2); border-radius:6px; padding:10px; margin-bottom:8px; overflow:auto; }
        
        /* SEÇÕES DO HUD */
        #intel { flex:1.5; border-left:4px solid #ff003c; }
        #conflicts { flex:0.6; border-left:4px solid #ffaa00; }
        #combat { flex:1.2; border-left:4px solid #00ff88; }

        .log { font-size:.7rem; margin-bottom:6px; color:white; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 4px; }
        .tag { color:#ff003c; font-size:.6rem; font-weight: bold; margin-right: 5px; }
        .win { color:#00ff88; font-family:'Orbitron'; font-weight:900; display: block; margin: 10px 0; }
        
        /* CONTROLES */
        .controls { margin-top: auto; }
        select { width:49%; padding:12px; background:#000; color:#00f3ff; border:1px solid #00f3ff; border-radius: 4px; font-size: 0.7rem; }
        button { width:100%; padding:18px; background:#ff003c; border:none; color:white; font-family:'Orbitron'; font-weight:900; cursor:pointer; border-radius: 4px; margin-top: 5px; }
    </style>
</head>
<body>

<div id="viewport"></div>

<div id="hud">
    <div style="display:flex;justify-content:space-between; align-items: center; margin-bottom: 10px;">
        <div>
            <h3 style="font-family:Orbitron; font-size: 0.8rem; margin:0;">GLOBAL WAR INTELLIGENCE</h3>
            <span style="color:#00ff88; font-size: 0.6rem;">● STATUS: OPERACIONAL</span>
        </div>
        <div id="clock" style="font-size: 0.9rem; font-weight: bold;">00:00:00</div>
    </div>

    <div id="intel" class="panel">
        <div id="newsFeed">Conectando aos satélites de notícias...</div>
    </div>

    <div id="conflicts" class="panel">
        <div id="conflictList"></div>
    </div>

    <div id="combat" class="panel">
        <div id="report">Aguardando definição de alvos para simulação de impacto...</div>
    </div>

    <div class="controls">
        <div style="display:flex;gap:4px;margin-bottom:5px">
            <select id="p1"></select>
            <select id="p2"></select>
        </div>
        <button onclick="simulate()">LANÇAR SIMULAÇÃO TÁTICA</button>
    </div>
</div>

<script>
const API = "ae46552e7af9425b8abfe9ed218ace41";

const PAISES = ["Afeganistão","África do Sul","Albânia","Alemanha","Andorra","Angola","Antígua e Barbuda","Arábia Saudita","Argélia","Argentina","Armênia","Austrália","Áustria","Azerbaijão","Bahamas","Bangladesh","Barbados","Barein","Bélgica","Belize","Benim","Bielorrússia","Bolívia","Bósnia e Herzegovina","Botswana","Brasil","Brunei","Bulgária","Burkina Faso","Burundi","Butão","Cabo Verde","Camarões","Camboja","Canadá","Catar","Cazaquistão","Chade","Chile","China","Chipre","Colômbia","Comores","Congo-Brazzaville","Congo-Kinshasa","Coreia do Norte","Coreia do Sul","Costa do Marfim","Costa Rica","Croácia","Cuba","Dinamarca","Djibouti","Dominica","Egito","El Salvador","Emirados Árabes Unidos","Equador","Eritreia","Eslováquia","Eslovênia","Espanha","Estados Unidos","Estônia","Eswatini","Etiópia","Fiji","Filipinas","Finlândia","França","Gabão","Gâmbia","Gana","Geórgia","Granada","Grécia","Guatemala","Guiana","Guiné","Guiné-Bissau","Guiné Equatorial","Haiti","Honduras","Hungria","Iêmen","Ilhas Marshall","Ilhas Salomão","Índia","Indonésia","Irã","Iraque","Irlanda","Islândia","Israel","Itália","Jamaica","Japão","Jordânia","Kiribati","Kuwait","Laos","Lesoto","Letônia","Líbano","Libéria","Líbia","Liechtenstein","Lituânia","Luxemburgo","Macedônia do Norte","Madagascar","Malásia","Malawi","Maldivas","Mali","Malta","Marrocos","Maurício","Mauritânia","México","Micronésia","Moçambique","Moldávia","Mônaco","Mongólia","Montenegro","Namíbia","Nauru","Nepal","Nicarágua","Níger","Nigéria","Noruega","Nova Zelândia","Omã","Países Baixos","Palau","Palestina","Panamá","Papua-Nova Guiné","Paquistão","Paraguai","Peru","Polônia","Portugal","Quênia","Quirguistão","Reino Unido","República Centro-Africana","República Checa","República Dominicana","Romênia","Ruanda","Rússia","Samoa","San Marino","Santa Lúcia","São Cristóvão e Névis","São Tomé e Príncipe","São Vicente e Granadinas","Senegal","Serra Leoa","Sérvia","Seychelles","Singapura","Síria","Somália","Sri Lanka","Sudão","Sudão do Sul","Suécia","Suíça","Suriname","Tailândia","Taiwan","Tajiquistão","Tanzânia","Timor-Leste","Togo","Tonga","Trinidad e Tobago","Tunísia","Turcomenistão","Turquia","Tuvalu","Ucrânia","Uganda","Uruguai","Uzbequistão","Vanuatu","Vaticano","Venezuela","Vietnã","Zâmbia","Zimbábue"];

const military = {
    "Estados Unidos": {air:98, land:92, navy:99, tech:99, eco:96, nuke:98, desc: "Domínio total aero-naval e tecnologia furtiva de ponta."},
    "China": {air:92, land:98, navy:94, tech:90, eco:98, nuke:88, desc: "Maior capacidade industrial e superioridade numérica terrestre."},
    "Rússia": {air:85, land:95, navy:80, tech:82, eco:70, nuke:99, desc: "Vasto arsenal nuclear e blindados pesados de alta resistência."},
    "Israel": {air:96, land:88, navy:72, tech:98, eco:82, nuke:85, desc: "Inteligência superior e sistema de defesa Iron Dome."},
    "Irã": {air:72, land:88, navy:65, tech:75, eco:62, nuke:45, desc: "Guerra assimétrica, drones e mísseis balísticos de longo alcance."},
    "Ucrânia": {air:70, land:85, navy:40, tech:78, eco:55, nuke:0, desc: "Alta experiência em combate moderno e artilharia precisa."},
    "Brasil": {air:68, land:72, navy:65, tech:62, eco:78, nuke:0, desc: "Logística continental e força terrestre experiente em selva."}
};

function getScore(c) {
    let d = military[c] || {air:60, land:60, navy:60, tech:60, eco:60, nuke:0};
    return (d.air*.25 + d.land*.20 + d.navy*.15 + d.tech*.20 + d.eco*.10 + d.nuke*.10);
}

function simulate() {
    let a = document.getElementById('p1').value;
    let b = document.getElementById('p2').value;
    if(a === b) return;

    let sa = getScore(a);
    let sb = getScore(b);
    let winner = sa > sb ? a : b;
    let dataW = military[winner] || {desc: "Capacidade militar padrão."};

    document.getElementById('report').innerHTML = `
        <b style="color:#ffaa00">DETALHAMENTO TÁTICO:</b><br><br>
        Teatro de operações entre <b>${a}</b> e <b>${b}</b>.<br>
        <span class="win">PROJEÇÃO DE VITÓRIA: ${winner}</span><br>
        <b>FATOR DETERMINANTE:</b> ${dataW.desc}<br><br>
        <b>VANTAGEM ANALÍTICA:</b><br>
        • Eficiência Tecnológica: ${sa > sb ? 'Superior' : 'Inferior'}<br>
        • Projeção de Força: +${Math.abs(sa-sb).toFixed(1)}% de vantagem estratégica sobre o oponente.
    `;
}

async function fetchNews() {
    let feed = document.getElementById('newsFeed');
    let url = `https://newsapi.org/v2/everything?q=(war OR military OR attack OR conflict)&language=pt&sortBy=publishedAt&pageSize=10&apiKey=${API}`;
    try {
        let r = await fetch(url);
        let d = await r.json();
        if(d.articles && d.articles.length > 0) {
            feed.innerHTML = "";
            d.articles.forEach(a => {
                feed.innerHTML += `<div class="log"><span class="tag">[INTEL]</span>${a.title}</div>`;
            });
        }
    } catch { feed.innerHTML = "Sincronizando via rádio de emergência..."; }
}

const conflicts = ["Rússia vs Ucrânia (Frente Ativa)", "Israel vs Hamas (Conflito Urbano)", "Irã vs Israel (Tensão Balística)", "Coreia do Norte vs Sul (Monitoramento)", "China vs Taiwan (Posicionamento Naval)"];
conflicts.forEach(c => { document.getElementById('conflictList').innerHTML += `<div class="log" style="color:#ffaa00">⚠ ${c}</div>`; });

// Preencher seletores corretamente
PAISES.sort().forEach(c => {
    document.getElementById('p1').innerHTML += `<option value="${c}">${c}</option>`;
    document.getElementById('p2').innerHTML += `<option value="${c}">${c}</option>`;
});

setInterval(() => document.getElementById('clock').innerText = new Date().toLocaleTimeString(), 1000);
fetchNews();
setInterval(fetchNews, 300000); // 5 min para não bloquear a API

// Globo 3D
const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({alpha:true, antialias: true});
renderer.setSize(window.innerWidth, window.innerHeight);
document.getElementById('viewport').appendChild(renderer.domElement);

const globe = new THREE.Mesh(
    new THREE.SphereGeometry(5, 64, 64),
    new THREE.MeshPhongMaterial({ map: new THREE.TextureLoader().load("https://threejs.org/examples/textures/planets/earth_atk_2048.jpg"), bumpScale: 0.05 })
);
scene.add(globe);
scene.add(new THREE.AmbientLight(0x555555));
const light = new THREE.DirectionalLight(0xffffff, 1);
light.position.set(5,3,5);
scene.add(light);
camera.position.z = 12;

function animate() {
    requestAnimationFrame(animate);
    globe.rotation.y += 0.0015;
    renderer.render(scene, camera);
}
animate();
</script>
</body>
</html>
