<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STRATOS | OMNI-INTEL</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <style>
        :root { --neon: #00f3ff; --danger: #ff003c; --safe: #00ff88; --bg: #00080f; }
        * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color: transparent; }
        body { background: #000; color: var(--neon); font-family: 'Courier New', monospace; height: 100vh; overflow: hidden; }
        
        /* Fundo com Globo */
        #viewport { position: fixed; inset: 0; opacity: 0.4; z-index: 1; }
        
        /* Interface HUD */
        #hud { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; padding: 15px; gap: 10px; background: radial-gradient(circle at center, transparent, rgba(0,0,0,0.8)); }
        
        .header { display: flex; justify-content: space-between; align-items: center; border-bottom: 2px solid var(--neon); padding-bottom: 10px; }
        #clock { font-size: 1.2rem; font-weight: bold; text-shadow: 0 0 10px var(--neon); }
        
        .panel { background: rgba(0,10,20,0.9); border: 1px solid rgba(0,243,255,0.3); border-radius: 4px; padding: 12px; overflow: hidden; backdrop-filter: blur(5px); }
        #intel { flex: 2; border-left: 4px solid var(--danger); position: relative; }
        
        .log { font-size: 0.85rem; margin-bottom: 12px; color: #fff; line-height: 1.4; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 8px; animation: scan 0.5s ease-out; }
        .tag { color: var(--danger); font-weight: 900; font-size: 0.65rem; border: 1px solid var(--danger); padding: 1px 5px; margin-right: 10px; letter-spacing: 1px; }
        
        @keyframes scan { from { transform: translateY(-10px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
        
        .status-bar { font-size: 0.7rem; color: var(--safe); display: flex; gap: 15px; }
        .blink { animation: blinker 1.5s linear infinite; }
        @keyframes blinker { 50% { opacity: 0; } }
    </style>
</head>
<body>
    <div id="viewport"></div>
    <div id="hud">
        <div class="header">
            <div>
                <h1 style="font-size: 1rem; letter-spacing: 2px;">STRATOS OMNI-INTEL</h1>
                <div class="status-bar">
                    <span><span class="blink">●</span> SISTEMA ATIVO</span>
                    <span>GEO-SCAN: 2026</span>
                </div>
            </div>
            <div id="clock">00:00:00</div>
        </div>

        <div id="intel" class="panel">
            <div id="feed"></div>
        </div>

        <div class="panel" style="border-left: 4px solid #ffaa00; flex: 0.4;">
            <h3 style="font-size: 0.7rem; color: #ffaa00; margin-bottom: 5px;">ZONAS DE CONFLITO ATIVAS:</h3>
            <div style="font-size: 0.75rem; color: #eee;">
                ⚠️ Leste Europeu (Alta Intensidade)<br>
                ⚠️ Estreito de Taiwan (Tensão Naval)<br>
                ⚠️ Oriente Médio (Alerta Balístico)
            </div>
        </div>
        
        <div style="text-align: center; font-size: 0.6rem; opacity: 0.4;">COMANDO GLOBAL - ACESSO RESTRITO</div>
    </div>

<script>
    // Inteligência Tática Simulada (Baseada em 2026)
    const tacticalData = [
        "Movimentação de blindados detectada no Setor Norte.",
        "Satélite OMNI-4 identifica nova base de drones inimiga.",
        "Ciberataque neutralizado contra o mainframe central.",
        "Alerta de prontidão aérea nível 5 na fronteira leste.",
        "Interrupção de sinal detectada em cabos submarinos.",
        "Comboio tático em deslocamento para zona de exclusão.",
        "Sistemas de defesa hipersônica em modo de espera.",
        "Atividade eletromagnética incomum em área urbana.",
        "Relatórios indicam escalada naval no Pacífico Sul.",
        "Interceptação de comunicações criptografadas de alto nível."
    ];

    function updateFeed() {
        const feed = document.getElementById('feed');
        const time = new Date().toLocaleTimeString();
        const msg = tacticalData[Math.floor(Math.random() * tacticalData.length)];
        const entry = document.createElement('div');
        entry.className = 'log';
        entry.innerHTML = `<span style="color:var(--neon); font-size:0.7rem;">[${time}]</span> <span class="tag">INTEL</span> ${msg}`;
        feed.prepend(entry);
        if (feed.children.length > 7) feed.lastChild.remove();
    }

    // Relógio e Ciclos
    setInterval(() => {
        document.getElementById('clock').innerText = new Date().toLocaleTimeString();
    }, 1000);
    
    setInterval(updateFeed, 5000);
    updateFeed();

    // Motor Gráfico do Globo (Three.js)
    const scene = new THREE.Scene();
    const camera = new THREE.PerspectiveCamera(75, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ alpha: true, antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    document.getElementById('viewport').appendChild(renderer.domElement);

    const geometry = new THREE.SphereGeometry(5, 64, 64);
    const material = new THREE.MeshPhongMaterial({
        color: 0x00f3ff,
        wireframe: true,
        transparent: true,
        opacity: 0.2
    });
    const globe = new THREE.Mesh(geometry, material);
    scene.add(globe);

    const light = new THREE.PointLight(0xffffff, 1, 100);
    light.position.set(10, 10, 10);
    scene.add(light);
    scene.add(new THREE.AmbientLight(0x404040));

    camera.position.z = 12;

    function animate() {
        requestAnimationFrame(animate);
        globe.rotation.y += 0.001;
        globe.rotation.x += 0.0005;
        renderer.render(scene, camera);
    }
    animate();

    window.addEventListener('resize', () => {
        camera.aspect = window.innerWidth / window.innerHeight;
        camera.updateProjectionMatrix();
        renderer.setSize(window.innerWidth, window.innerHeight);
    });
</script>
</body>
</html>
