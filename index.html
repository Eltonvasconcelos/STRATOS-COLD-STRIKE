<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>STRATOS v27.4 | WAR ROOM</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;900&family=JetBrains+Mono:wght@400;700&display=swap" rel="stylesheet">
    <style>
        :root { --n: #00f3ff; --a: #ff003c; --win: #00ff88; --bg: rgba(0, 5, 10, 0.95); }
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'JetBrains Mono', monospace; }
        body { background: #000; color: var(--n); height: 100vh; overflow: hidden; }
        #viewport { position: fixed; inset: 0; z-index: 1; opacity: 0.3; }
        #hud { position: relative; z-index: 10; height: 100vh; display: flex; flex-direction: column; padding: 10px; }
        .panel { background: var(--bg); border: 1px solid rgba(0, 243, 255, 0.2); border-radius: 4px; backdrop-filter: blur(10px); }
        
        /* FEED REAL (SUPERIOR) */
        #intel-area { flex: 1.5; overflow-y: auto; margin-bottom: 8px; padding: 10px; border-left: 3px solid var(--a); }
        .log-line { font-size: 0.7rem; color: #fff; margin-bottom: 8px; border-bottom: 1px solid rgba(255,255,255,0.05); padding-bottom: 5px; }
        .news-header { color: var(--a); font-weight: bold; font-size: 0.6rem; display: block; }

        /* RELATÓRIO TÁTICO (CENTRO) */
        #combat-area { flex: 1.2; overflow-y: auto; margin-bottom: 8px; padding: 10px; border: 1px solid var(--win); }
        .tactical-report { font-size: 0.7rem; color: #fff; line-height: 1.3; }
        .win-tag { color: var(--win); font-family: 'Orbitron'; font-weight: 900; font-size: 0.9rem; margin-top: 5px; display: block; }

        /* CONTROLES (INFERIOR) */
        .row { display: flex; gap: 5px; margin-bottom: 8px; width: 100%; }
        select { background: #000; color: var(--n); border: 1px solid var(--n); padding: 12px 5px; font-size: 0.7rem; width: 49%; border-radius: 4px; }
        .btn-war { width: 100%; background: var(--a); color: #fff; border: none; padding: 18px; font-family: 'Orbitron'; font-weight: 900; cursor: pointer; border-radius: 4px; }
    </style>
</head>
<body>
    <div id="viewport"></div>
    <div id="hud">
        <div style="display:flex; justify-content:space-between; margin-bottom:5px;">
            <h2 style="font-family:'Orbitron'; font-size:0.6rem;">STRATOS TACTICAL v27.4</h2>
            <div id="clock" style="font-size:0.8rem;">00:00:00</div>
        </div>

        <div id="intel-area" class="panel">
            <div id="news-feed">Conectando aos satélites de notícias...</div>
        </div>

        <div id="combat-area" class="panel">
            <div id="tactical-log" style="font-size:0.65rem; color:rgba(255,255,255,0.5);">Aguardando definição de alvos para simulação de impacto...</div>
        </div>

        <div class="controls">
            <div class="row"><select id="atq"></select><select id="def"></select></div>
            <button class="btn-war" onclick="simulate()">INICIAR SIMULAÇÃO REAL</button>
        </div>
    </div>

<script>
const API_KEY = 'ae46552e7af9425b8abfe9ed218ace41';
const PAISES = ["Afeganistão","África do Sul","Alemanha","Arábia Saudita","Argentina","Austrália","Brasil","Canadá","China","Coreia do Norte","Coreia do Sul","Egito","Emirados Árabes","Espanha","Estados Unidos","França","Índia","Irã","Iraque","Israel","Itália","Japão","México","Portugal","Reino Unido","Rússia","Turquia","Ucrânia","Venezuela"];

// BANCO DE DADOS TÁTICO
const MIL_DATA = {
    "Estados Unidos": { p: 99, info: "Supremacia aérea e projeção naval global." },
    "China": { p: 98, info: "Maior exército terrestre e rápida expansão tecnológica." },
    "Rússia": { p: 96, info: "Maior arsenal nuclear e vasta experiência em guerra fria." },
    "Israel": { p: 94, info: "Defesa antimísseis Iron Dome e inteligência Mossad elite." },
    "Irã": { p: 85, info: "Especialista em guerra assimétrica e vasta rede de proxies." },
    "Brasil": { p: 80, info: "Maior força da América Latina, focado em defesa de fronteira." }
};

async function getLiveNews() {
    const feed = document.getElementById('news-feed');
    const url = `https://newsapi.org/v2/everything?q=(war OR military OR attack OR conflict OR Israel OR Iran OR USA)&language=pt&sortBy=publishedAt&apiKey=${API_KEY}`;
    try {
        const res = await fetch(url);
        const data = await res.json();
        if(data.articles) {
            feed.innerHTML = '';
            data.articles.slice(0, 10).forEach(art => {
                feed.innerHTML += `<div class="log-line"><span class="news-header">[SINAL REAL] ${art.source.name}</span>${art.title}</div>`;
            });
        }
    } catch (e) { feed.innerHTML = "Buscando fontes alternativas de inteligência..."; }
}

function simulate() {
    const p1 = document.getElementById('atq').value, p2 = document.getElementById('def').value;
    if(p1 === p2) return;
    
    const d1 = MIL_DATA[p1] || {p: 60, info: "Capacidade militar padrão de defesa regional."};
    const d2 = MIL_DATA[p2] || {p: 60, info: "Capacidade militar padrão de defesa regional."};
    
    const win = d1.p > d2.p ? p1 : p2;
    const diff = Math.abs(d1.p - d2.p);
    
    let motivo = d1.p > d2.p ? d1.info : d2.info;
    let analise = `CONFLITO: ${p1} vs ${p2}. Em um cenário de guerra total, o vencedor provável seria ${win}. A vantagem deve-se à: ${motivo} Além disso, a diferença de tecnologia militar é de ${diff} pontos no índice global.`;

    document.getElementById('tactical-log').innerHTML = `
        <div class="tactical-report">
            <span style="color:var(--alert)">[RELATÓRIO DE IMPACTO]</span><br>${analise}
            <span class="win-tag">DOMÍNIO: ${win}</span>
        </div>`;
}

// INICIALIZAÇÃO
setInterval(() => { document.getElementById('clock').innerText = new Date().toLocaleTimeString('pt-BR'); }, 1000);
getLiveNews();
setInterval(getLiveNews, 300000);
const fill = (el) => PAISES.sort().forEach(p => el.innerHTML += `<option value="${p}">${p}</option>`);
fill(document.getElementById('atq')); fill(document.getElementById('def'));

const scene = new THREE.Scene();
const camera = new THREE.PerspectiveCamera(45, window.innerWidth/window.innerHeight, 0.1, 1000);
const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
renderer.setSize(window.innerWidth, window.innerHeight);
document.getElementById('viewport').appendChild(renderer.domElement);
const globe = new THREE.Mesh(new THREE.SphereGeometry(5, 32, 32), new THREE.MeshPhongMaterial({ map: new THREE.TextureLoader().load('https://threejs.org/examples/textures/planets/earth_atk_2048.jpg') }));
scene.add(globe); scene.add(new THREE.AmbientLight(0x444444), new THREE.DirectionalLight(0xffffff, 1));
camera.position.z = 12;
const animate = () => { requestAnimationFrame(animate); globe.rotation.y += 0.002; renderer.render(scene, camera); };
animate();
</script>
</body>
</html>
